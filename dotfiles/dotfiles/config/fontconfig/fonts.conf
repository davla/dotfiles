<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>sans</family>
    <prefer>
      <family>DejaVuSans</family>
      <family>SymbolsNerdFont</family>
      <family>FreeSans</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVuSans</family>
      <family>SymbolsNerdFont</family>
      <family>FreeSans</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVuSansMono</family>
      <family>SymbolsNerdFontMono</family>
      <family>FreeMono</family>
    </prefer>
  </alias>
  <alias>
    <family>mono</family>
    <prefer>
      <family>DejaVuSansMono</family>
      <family>SymbolsNerdFontMono</family>
      <family>FreeMono</family>
    </prefer>
  </alias>
    <match target="pattern">
    <edit name="dpi" mode="assign">
      <double>96</double>
    </edit>
  </match>
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>
  <match target="font">
    <test qual="all" name="rgba" compare="eq">
      <const>unknown</const>
    </test>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>
</fontconfig>
