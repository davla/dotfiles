%YAML 1.2
---
# This variables file defines some i3-related variables for my personal system
# only, for unprivileged users.

variables:
  browser: firefox
  i3blocks_temperature_chip: coretemp-isa-0000

  messaging:
    cmd: messaging
    mark: messaging
    criterion: con_mark="{{@@ messaging.mark @@}}"
    apps:
    - cmd: org.telegram.desktop
      window_criterion: org.telegram.desktop

    - cmd: org.signal.Signal
      window_criterion: org.signal.Signal

    - cmd: com.sindresorhus.Caprine
      window_criterion: Caprine
