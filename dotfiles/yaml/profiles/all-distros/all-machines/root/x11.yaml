%YAML 1.2
---
# This dotdrop config file defines profile variants that extend the original
# profile with X11-only dotfiles. It's meant for root

config:
  backup: false
  banner: true
  create: true
  dotpath: ../../../../../dotfiles
  force_chmod: true
  func_file:
  - ../../../../../python/functions.py
  ignoreempty: true
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: false
  showdiff: true
  workdir: '{{@@ xdg_config("dotdrop") @@}}'

dotfiles:
  d_xorg.conf.d:
    src: etc/X11/xorg.conf.d
    dst: /etc/X11/xorg.conf.d
    cmpignore:
    - 92-mode*.conf
    instignore:
    - 92-mode*.conf
    upignore:
    - 92-mode*.conf
  f_x11_mode_4k.conf:
    src: etc/X11/xorg.conf.d/92-mode-4k.conf
    dst: /etc/X11/xorg.conf.d/92-mode-4k.conf
  f_x11_mode_1080p.conf:
    src: etc/X11/xorg.conf.d/92-mode-1080p.conf
    dst: /etc/X11/xorg.conf.d/92-mode-1080p.conf
  f_override-userxsessionrc:
    src: etc/X11/Xsession.d/01x11-override-userxsessionrc
    dst: /etc/X11/Xsession.d/01x11-override-userxsessionrc
  f_xsession.options:
    src: etc/X11/Xsession.options
    dst: /etc/X11/Xsession.options

profiles:
  # This profile gathers dotfiles used for system startup only on X11
  startup-x11:
    dotfiles:
    - f_override-userxsessionrc
    - f_xsession.options

  # This profile holds dotfiles used for system-wide configuration only on X11
  system-tweaks-x11:
    dotfiles:
    - d_xorg.conf.d
    import:
    - ../../../../dotfiles/all-distros/{{@@ env['HOST'] @@}}/{{@@ user @@}}/system-tweaks-x11.yaml:optional

variables:
  # This variable is used to differentiate between user and root configuration
  # in some dotfiles.
  user: root

