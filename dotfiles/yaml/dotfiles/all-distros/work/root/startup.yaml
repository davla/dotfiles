%YAML 1.2
---
# This dotfiles file lists the dotfiles to be included in the "startup" profile
# only on my work machine for root.

dotfiles:
- f_pam.d_login
# The order here matters. The *.automount unit is enabled in a dotdrop
# post-install action, which fails if needs its *.mount doesn't exist.
- f_vm-shared.mount
- f_vm-shared.automount
